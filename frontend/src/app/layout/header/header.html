<div class="app-topbar">
  <a routerLink="/planning" class="brand">
    <svg
      width="22"
      height="22"
      viewBox="0 0 40 40"
      style="vertical-align: middle; margin-right: 8px"
    >
      <circle cx="20" cy="20" r="18" fill="var(--primary)" />
      <path d="M 20 20 L 38 20 A 18 18 0 0 1 20.0 38 Z" fill="#FBF5E9" opacity="0.9" />
      <path d="M 20 20 L 2.6 29 A 18 18 0 0 1 2.6 11 Z" fill="#FBF5E9" opacity="0.9" />
      <path d="M 20 20 L 11 2.6 A 18 18 0 0 1 29 2.6 Z" fill="#FBF5E9" opacity="0.9" />
      <path d="M 20 20 L 38 20 A 18 18 0 0 0 29 2.6 Z" fill="#FBF5E9" opacity="0.9" />
      <circle cx="20" cy="20" r="2.5" fill="var(--primary)" />
    </svg>
    Bagni Plage
  </a>

  @if (auth.isAuthenticated()) {
  <nav>
    <a routerLink="/planning" routerLinkActive="active">Planning</a>
    <a routerLink="/reservations" routerLinkActive="active">Réservations</a>
    <a routerLink="/profil" routerLinkActive="active">Mon profil</a>
  </nav>
  }

  <span class="spacer"></span>

  <button
    class="btn btn--ghost btn--sm"
    style="padding: 0; width: 36px; height: 36px; border-radius: 10px"
    (click)="theme.toggle()"
    [title]="theme.isDark() ? 'Mode clair' : 'Mode sombre'"
  >
    @if (theme.isDark()) {
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
    >
      <circle cx="12" cy="12" r="5" />
      <path
        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
      />
    </svg>
    } @else {
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
    >
      <path d="M20 14a8 8 0 1 1-10-10 7 7 0 0 0 10 10z" />
    </svg>
    }
  </button>

  @if (auth.isAuthenticated()) {
  <button
    class="btn btn--ghost btn--sm"
    style="padding: 0; width: 36px; height: 36px; border-radius: 10px"
    (click)="auth.logout()"
    title="Déconnexion"
  >
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
    >
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
    </svg>
  </button>
  }
</div>
