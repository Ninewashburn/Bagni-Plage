<div class="app-topbar">
  <div class="brand" aria-label="Bagni Plage">
    <span class="brand-mark" aria-hidden="true">
      <svg width="24" height="24" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18" fill="var(--primary)" />
        <path d="M20 20 L38 20 A18 18 0 0 1 20 38 Z" fill="#fbf5e9" opacity="0.9" />
        <path d="M20 20 L2.6 29 A18 18 0 0 1 2.6 11 Z" fill="#fbf5e9" opacity="0.9" />
        <path d="M20 20 L11 2.6 A18 18 0 0 1 29 2.6 Z" fill="#fbf5e9" opacity="0.9" />
        <path d="M20 20 L38 20 A18 18 0 0 0 29 2.6 Z" fill="#fbf5e9" opacity="0.9" />
        <circle cx="20" cy="20" r="2.5" fill="var(--primary)" />
      </svg>
    </span>
    <span>
      <strong>Bagni Plage</strong>
      <small>Réservation & guide côtier</small>
    </span>
  </div>

  <nav class="topbar-nav" aria-label="Navigation principale">
    <a routerLink="/guide" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      >Accueil</a
    >
    <a routerLink="/plages" routerLinkActive="active">Plages</a>
    <a routerLink="/offres" routerLinkActive="active">Offres</a>
    <a routerLink="/guide-local" routerLinkActive="active">Guide local</a>
  </nav>

  <span class="spacer"></span>

  @if (auth.isAuthenticated() && !auth.isConcessionnaire()) {
  <a routerLink="/reserver" class="btn btn--primary btn--sm topbar-cta">Réserver</a>
  }

  <button
    class="btn btn--ghost btn--sm topbar-icon-btn"
    (click)="theme.toggle()"
    [title]="theme.isDark() ? 'Mode clair' : 'Mode sombre'"
  >
    @if (theme.isDark()) {
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
    >
      <circle cx="12" cy="12" r="5" />
      <path
        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
      />
    </svg>
    } @else {
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
    >
      <path d="M20 14a8 8 0 1 1-10-10 7 7 0 0 0 10 10z" />
    </svg>
    }
  </button>

  @if (auth.isAuthenticated()) {
  <a
    routerLink="/profil"
    routerLinkActive="active"
    class="btn btn--ghost btn--sm topbar-icon-btn"
    title="Mon profil"
    aria-label="Mon profil"
  >
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M20 21a8 8 0 0 0-16 0" />
      <circle cx="12" cy="8" r="4" />
    </svg>
  </a>
  <button
    class="btn btn--ghost btn--sm topbar-icon-btn"
    (click)="auth.logout()"
    title="Déconnexion"
  >
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
    >
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
    </svg>
  </button>
  } @else {
  <a routerLink="/login" class="btn btn--outline btn--sm">Connexion</a>
  }
</div>
