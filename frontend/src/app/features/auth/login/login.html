<div class="auth-page">
  <div class="auth-hero">
    <app-beach-backdrop [height]="300" />
    <div class="auth-hero-overlay"></div>
    <div class="auth-hero-content">
      <div class="estate-label">Estate 2026</div>
      <div class="hero-title">Bentornato</div>
    </div>
  </div>

  <div class="auth-form-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <app-bagni-logo [size]="20" />
        <h1>Connexion</h1>
        <p>Entrez vos identifiants pour accéder à votre espace</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" autocomplete="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Mot de passe</mat-label>
          <input
            matInput
            formControlName="motDePasse"
            type="password"
            autocomplete="current-password"
          />
        </mat-form-field>

        @if (error()) {
        <p class="error-msg" style="text-align: center">{{ error() }}</p>
        }

        <button class="btn btn--ink btn--full" type="submit" [disabled]="form.invalid || loading()">
          @if (loading()) { Connexion… } @else { Se connecter }
        </button>
      </form>

      <p style="text-align: center; margin-top: 20px; font-size: 0.875rem; color: var(--ink-soft)">
        Pas encore de compte ?
        <a
          routerLink="/register"
          style="color: var(--primary); font-weight: 600; text-decoration: none"
          >Créer un compte</a
        >
      </p>
    </div>
  </div>
</div>
