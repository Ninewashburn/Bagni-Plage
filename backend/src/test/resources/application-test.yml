spring:
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:bagni_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

jwt:
  secret: test_secret_key_256_bits_minimum_length_for_tests_only
  expiration-ms: 3600000

logging:
  level:
    root: WARN
    fr.bagni.backend: WARN
    org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger: OFF
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
