<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bagni Plage — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F4E9D8; font-family: 'Work Sans', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes slideup { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(43, 29, 19, 0.2); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 1000;
    background: #FBF5E9; border: 1px solid rgba(43,29,19,.15);
    border-radius: 18px; padding: 18px 20px; min-width: 260px;
    box-shadow: 0 12px 40px rgba(0,0,0,.12);
    font-family: 'Work Sans', sans-serif;
    animation: slideup 0.3s cubic-bezier(.2,.7,.3,1);
  }
  .tweaks-panel h3 {
    margin: 0 0 12px; font-family: 'DM Serif Display', serif;
    font-size: 17px; color: #2B1D13; display: flex; align-items: center; justify-content: space-between;
  }
  .tweaks-panel .close {
    border: none; background: transparent; cursor: pointer; color: #5A4432; padding: 2px;
  }
  .tweaks-panel label {
    font-size: 11px; color: #5A4432; text-transform: uppercase;
    letter-spacing: 1px; display: block; margin: 12px 0 6px;
  }
  .swatches { display: flex; gap: 8px; }
  .swatch {
    width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .swatch.active { border-color: #2B1D13; }
  .swatch::after { content: attr(data-name); position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #5A4432; white-space: nowrap; }

  /* Role switch */
  .role-switch {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 500;
    background: #FBF5E9; border: 1px solid rgba(43,29,19,.15);
    border-radius: 999px; padding: 4px;
    display: flex; gap: 2px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    font-family: 'Work Sans', sans-serif;
  }
  .role-switch button {
    padding: 8px 18px; border: none; border-radius: 999px;
    background: transparent; color: #2B1D13; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .role-switch button.active { background: #2B1D13; color: #F4E9D8; }
  .role-switch.dark { background: #261D13; border-color: rgba(244,233,216,.2); }
  .role-switch.dark button { color: #F4E9D8; }
  .role-switch.dark button.active { background: #F4E9D8; color: #2B1D13; }

  /* Dark body bg */
  body.dark { background: #17120D; }

  /* Tweaks toggle button (floating, visible when panel closed) */
  .tweaks-fab {
    position: fixed; bottom: 20px; right: 20px; z-index: 1000;
    width: 48px; height: 48px; border-radius: 50%;
    background: #2B1D13; color: #F4E9D8; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="parasol-grid.jsx"></script>
<script type="text/babel" src="client-mobile.jsx"></script>
<script type="text/babel" src="manager-desktop.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "limone",
  "dark": true,
  "role": "client"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { const saved = localStorage.getItem('bagni-tweaks'); if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) }; } catch {}
    return TWEAK_DEFAULTS;
  });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [editModeActive, setEditModeActive] = React.useState(false);

  const setT = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    try { localStorage.setItem('bagni-tweaks', JSON.stringify(next)); } catch {}
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*'); } catch {}
  };

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') { setEditModeActive(true); setTweaksOpen(true); }
      if (e.data?.type === '__deactivate_edit_mode') { setEditModeActive(false); setTweaksOpen(false); }
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', handler);
  }, []);

  React.useEffect(() => {
    document.body.classList.toggle('dark', tweaks.dark);
    document.body.style.background = tweaks.dark ? '#17120D' : BAGNI_PALETTES[tweaks.palette].cream;
  }, [tweaks.dark, tweaks.palette]);

  return (
    <ThemeProvider initial={tweaks.palette} initialDark={tweaks.dark}
      onChange={({ paletteKey, dark }) => {
        // keep context in sync with tweaks (one-way from controls to context)
      }}>
      <InnerApp tweaks={tweaks} setT={setT} tweaksOpen={tweaksOpen} setTweaksOpen={setTweaksOpen} editModeActive={editModeActive} />
    </ThemeProvider>
  );
}

function InnerApp({ tweaks, setT, tweaksOpen, setTweaksOpen, editModeActive }) {
  const theme = useTheme();
  // Keep ThemeProvider in sync with external tweaks
  React.useEffect(() => { theme.setPaletteKey(tweaks.palette); }, [tweaks.palette]);
  React.useEffect(() => { theme.setDark(tweaks.dark); }, [tweaks.dark]);

  const c = useColors();
  const isClient = tweaks.role === 'client';

  return (
    <div style={{ minHeight: '100vh', background: c.bg, color: c.ink, position: 'relative' }}>
      {/* Role switch */}
      <div className={`role-switch ${tweaks.dark ? 'dark' : ''}`}>
        <button className={isClient ? 'active' : ''} onClick={() => setT({ role: 'client' })}>
          {Icon.user(14)} Client · Mobile
        </button>
        <button className={!isClient ? 'active' : ''} onClick={() => setT({ role: 'manager' })}>
          {Icon.umbrella(14)} Concessionnaire · Desktop
        </button>
      </div>

      {isClient ? <ClientStage c={c} tweaks={tweaks} /> : <ManagerStage c={c} />}

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div className="tweaks-panel" style={{ background: c.bgCard, borderColor: c.border, color: c.ink }}>
          <h3>
            <span>Tweaks</span>
            <button className="close" onClick={() => setTweaksOpen(false)} style={{ color: c.inkSoft }}>{Icon.x(16)}</button>
          </h3>
          <label style={{ color: c.inkSoft }}>Palette</label>
          <div className="swatches">
            {Object.entries(BAGNI_PALETTES).map(([k, p]) => (
              <button
                key={k}
                className={`swatch ${tweaks.palette === k ? 'active' : ''}`}
                data-name={p.name}
                onClick={() => setT({ palette: k })}
                style={{
                  background: `linear-gradient(135deg, ${p.primary} 0%, ${p.primary} 50%, ${p.cream} 50%, ${p.cream} 100%)`,
                  borderColor: tweaks.palette === k ? c.ink : 'transparent',
                }}
              />
            ))}
          </div>
          <label style={{ color: c.inkSoft, marginTop: 24 }}>Thème</label>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => setT({ dark: false })} style={{
              flex: 1, padding: '10px', borderRadius: 10,
              border: `1.5px solid ${!tweaks.dark ? c.primary : c.border}`,
              background: !tweaks.dark ? c.primary + '15' : 'transparent',
              color: c.ink, cursor: 'pointer', fontFamily: 'inherit', fontSize: 12,
            }}>☀ Clair</button>
            <button onClick={() => setT({ dark: true })} style={{
              flex: 1, padding: '10px', borderRadius: 10,
              border: `1.5px solid ${tweaks.dark ? c.primary : c.border}`,
              background: tweaks.dark ? c.primary + '15' : 'transparent',
              color: c.ink, cursor: 'pointer', fontFamily: 'inherit', fontSize: 12,
            }}>☾ Sombre</button>
          </div>
        </div>
      )}
      {!tweaksOpen && !editModeActive && (
        <button className="tweaks-fab" onClick={() => setTweaksOpen(true)} title="Tweaks">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.2 4.2l4.3 4.3M15.5 15.5l4.3 4.3M1 12h6M17 12h6M4.2 19.8l4.3-4.3M15.5 8.5l4.3-4.3"/>
          </svg>
        </button>
      )}
    </div>
  );
}

function ClientStage({ c, tweaks }) {
  const [screen, setScreen] = React.useState('home');
  return (
    <div style={{ minHeight: '100vh', padding: '90px 20px 60px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24 }}>
      {/* Editorial header */}
      <div style={{ textAlign: 'center', maxWidth: 600 }}>
        <div style={{ fontFamily: FONTS.serif, fontStyle: 'italic', fontSize: 13, letterSpacing: 4, textTransform: 'uppercase', color: c.inkSoft }}>
          ~ Côté client · iOS ~
        </div>
        <div style={{ fontFamily: FONTS.display, fontSize: 38, color: c.ink, lineHeight: 1.1, marginTop: 8 }}>
          Réservez votre <em style={{ color: c.primary }}>parasol</em>
        </div>
        <div style={{ color: c.inkSoft, fontSize: 14, marginTop: 8 }}>
          Naviguez parmi les écrans &middot; cliquez un parasol pour sélectionner &middot; paiement Paypal sandbox mocké
        </div>
      </div>

      {/* Screen nav */}
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center' }}>
        {[
          ['home', 'Accueil'],
          ['grid', 'Choisir parasol'],
          ['equip', 'Équipement'],
          ['pay', 'Paypal'],
          ['success', 'Confirmation'],
          ['mine', 'Mes réservations'],
        ].map(([k, l]) => (
          <button key={k} onClick={() => setScreen(k)} style={{
            padding: '6px 14px', fontSize: 12, borderRadius: 999,
            border: `1px solid ${screen === k ? c.ink : c.border}`,
            background: screen === k ? c.ink : 'transparent',
            color: screen === k ? c.bg : c.ink,
            cursor: 'pointer', fontFamily: FONTS.sans,
          }}>{l}</button>
        ))}
      </div>

      {/* Phone frame */}
      <div style={{
        width: 402, height: 874, borderRadius: 48, overflow: 'hidden', position: 'relative',
        boxShadow: '0 40px 100px rgba(0,0,0,.18), 0 0 0 12px ' + (tweaks.dark ? '#0a0603' : '#2B1D13') + ', 0 0 0 14px rgba(0,0,0,.1)',
        background: c.bg,
      }}>
        <div style={{ position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)', width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50 }} />
        <ClientApp key={screen} initialScreen={screen} />
        <div style={{ position: 'absolute', bottom: 6, left: '50%', transform: 'translateX(-50%)', width: 139, height: 5, borderRadius: 100, background: tweaks.dark ? 'rgba(255,255,255,.7)' : 'rgba(0,0,0,.3)', zIndex: 60 }} />
      </div>

      <div style={{ textAlign: 'center', maxWidth: 520, marginTop: 12 }}>
        <div style={{ fontFamily: FONTS.serif, fontStyle: 'italic', fontSize: 13, color: c.inkSoft, lineHeight: 1.6 }}>
          « Le parasol est le véritable salon d'été de l'Italie. »
        </div>
      </div>
    </div>
  );
}

function ManagerStage({ c }) {
  // Fit desktop in viewport by scaling
  const [scale, setScale] = React.useState(1);
  const stageRef = React.useRef(null);
  React.useEffect(() => {
    const fit = () => {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const margin = 120;
      const s = Math.min((vw - 60) / 1440, (vh - margin) / 900);
      setScale(Math.min(1, s));
    };
    fit(); window.addEventListener('resize', fit); return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div style={{ minHeight: '100vh', padding: '90px 20px 40px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
      <div style={{ textAlign: 'center', maxWidth: 600 }}>
        <div style={{ fontFamily: FONTS.serif, fontStyle: 'italic', fontSize: 13, letterSpacing: 4, textTransform: 'uppercase', color: c.inkSoft }}>
          ~ Côté concessionnaire · Desktop ~
        </div>
        <div style={{ fontFamily: FONTS.display, fontSize: 38, color: c.ink, lineHeight: 1.1, marginTop: 8 }}>
          Gérer votre <em style={{ color: c.primary }}>Bagno</em>
        </div>
      </div>

      <div style={{ width: 1440 * scale, height: 900 * scale, position: 'relative' }}>
        <div ref={stageRef} style={{
          width: 1440, height: 900,
          transform: `scale(${scale})`, transformOrigin: 'top left',
          borderRadius: 16, overflow: 'hidden',
          boxShadow: '0 40px 100px rgba(0,0,0,.18), 0 0 0 1px rgba(43,29,19,.08)',
        }}>
          <div style={{ width: '100%', height: 32, background: '#2B1D13', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 8 }}>
            <div style={{ display: 'flex', gap: 6 }}>
              <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#ff5f57' }} />
              <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#febc2e' }} />
              <div style={{ width: 11, height: 11, borderRadius: '50%', background: '#28c840' }} />
            </div>
            <div style={{ marginLeft: 24, fontSize: 11, color: 'rgba(255,255,255,.5)', fontFamily: FONTS.mono }}>bagni-plage.app/manager</div>
          </div>
          <div style={{ width: '100%', height: 868 }}>
            <ManagerApp />
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
